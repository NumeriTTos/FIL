<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Utilizador</title>

    <style>
        body {
            font-family: Arial;
            background: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .box {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 90%;
            max-width: 350px;
            text-align: center;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }
        input {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            font-size: 18px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }
        button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
        }
        #link {
            margin-top: 15px;
            font-size: 14px;
            word-break: break-all;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Novo Utilizador</h2>

    <input id="nome" type="text" placeholder="Nome do utilizador">

    <button onclick="criarUtilizador()">Criar</button>

    <p id="resultado"></p>
    <p id="link"></p>
</div>

<!-- IMPORTANTE: caminho correto para o JS -->
<script type="module" src="criar_utilizador.js"></script>

</body>
</html>
