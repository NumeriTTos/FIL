<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <style>
        body {
            font-family: Arial;
            background: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .box {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 90%;
            max-width: 350px;
            text-align: center;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }
        input {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            font-size: 18px;
            border-radius: 8px;
            border: 1px solid #ccc;
            text-align: center;
        }
        button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Confirmar Acesso</h2>
    <p>Introduz o teu PIN</p>

    <input id="pin" type="password" maxlength="6" placeholder="PIN">
    <button onclick="confirmarPIN()">Entrar</button>

    <p id="erro" style="color:red; margin-top:10px;"></p>
</div>

<!-- IMPORTANTE: este caminho deve corresponder ao local real do ficheiro -->
<script type="module" src="login.js"></script>

</body>
</html>
